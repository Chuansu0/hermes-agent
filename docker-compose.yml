# Multi-service deployment: Sherlock Bot + Real Hermes Agent (nousresearch)
version: "3.8"

services:
  # --- Existing Sherlock Bot (Zeabur deployment) ---
  sherlock:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sherlock-bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - hermes-env
    environment:
      - PORT=8080
      - PYTHONUNBUFFERED=1
    volumes:
      - ./hermes_agent:/app/hermes_agent
    networks:
      - hermes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Real Hermes Agent (nousresearch) ---
  # Clone from: https://github.com/nousresearch/hermes-agent
  # Docs: https://hermes-agent.nousresearch.com/docs/user-guide/docker
  hermes-agent:
    build:
      context: ./nousresearch-hermes-agent
      dockerfile: Dockerfile
    container_name: hermes-agent-real
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - HERMES_API_KEY=${HERMES_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - hermes-data:/app/data
      - hermes-config:/app/config
    networks:
      - hermes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  hermes-network:
    driver: bridge

volumes:
  hermes-data:
  hermes-config:
